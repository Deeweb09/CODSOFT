<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* body{
            background-color: red;
        } */
        .calculator {
            background-color: rgb(38, 38, 80);
            justify-content: center;
            height: 550px;
            width: 800px;
            margin-left: 150px;
            margin-top: 50px;
        }

        #display {
            background-color: rgb(227, 227, 231);
            border: 10px solid rgb(5, 5, 66);
            height: 100px;
            width: 740px;
            padding: 20px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 50px;
        }

        .operator {
            display: flex;
            font-size: 30px;
            color: rgb(22, 22, 22);
            text-align: center;
        }

        .button {

            display: flex;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;

        }


        button:active {
            opacity: 0.7;
        }

        button {
            height: 65px;
            width: 180px;
            border-radius: 35px;
        }

        .zero {
            grid-column: span 1;
            border-radius: 35px;
            text-align: left;
            padding-left: 25px;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- creating background calculator -->
    <div class="calculator">
        <!-- dispaly, operators& buttons -->
        <div class="display">
            <input type="text" id="display" readonly value="0">
        </div>
        <div class="button">
            <button class="opertor" onclick="addTodisplay('/')">/</button>
            <button class="opertor" onclick="addTodisplay('*')">*</button>
            <button class="opertor" onclick="cleardisplay('AC')">AC</button>
            <button class="opertor" onclick="addTodisplay('%')">%</button>
            <button onclick="addTodisplay('7')">7</button>
            <button onclick="addTodisplay('8')">8</button>
            <button onclick="addTodisplay('9')">9</button>
            <button class="operator" onclick="addTodisplay('+')">+</button>

            <button onclick="addTodisplay('4')">4</button>
            <button onclick="addTodisplay('5')">5</button>
            <button onclick="addTodisplay('6')"> 6</button>
            <button class="operator" onclick="addTodisplay('-')">-</button>

            <button onclick="addTodisplay('1')">1</button>
            <button onclick="addTodisplay('2')">2</button>
            <button onclick="addTodisplay('3')">3</button>
            <button class="operator" onclick="addTodisplay('#')">#</button>

            <button class="zero">0</button>
            <button onclick="addTodisplay('.')">.</button>
            <button class="equal" onclick="cal()">=</button>
        </div>

    </div>
    <script>
        let dispaly = document.getElementById('display');
        function addTodisplay(value){
            if (display.value=="0") {
                display.value = value;  
            }
            else display.value += value;
        }
        // clear display
        function cleardisplay(){
            display.value ="";
        }
        // create cal function to calculate
        function cal(value){
            try{
                display.value = eval(display.value);
            }
            catch (error){
                display.value ="ERROR";
            }
        }
                
    </script>


</body>

</html>
